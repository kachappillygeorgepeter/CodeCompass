<!-- This file defines the HTML structure for the options page of the Code Compass
extension. It includes a dropdown menu for selecting the explanation style
(Beginner or Expert). Links to the associated CSS and JavaScript files.-->

<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Code Compass Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <h3>Code Compass</h3>

    <label>
      Explanation style:
      <select id="verbosity">
        <option value="beginner">Beginner</option>
        <option value="expert">Expert</option>
      </select>
    </label>

    <script src="options.js"></script>
  </body>
</html>
